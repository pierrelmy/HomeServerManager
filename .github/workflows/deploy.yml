name: Deploy production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: true
        default: main

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to homelab
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    env:
      HOST: ${{ secrets.PRODUCTION_HOST }}
      USER: ${{ secrets.PRODUCTION_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.PRODUCTION_SSH_KNOWN_HOSTS }}
      GHCR_USERNAME: ${{ secrets.PRODUCTION_GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.PRODUCTION_GHCR_TOKEN }}

    steps:
      - name: Checkout selected revision
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}

      - name: Validate deployment secrets
        id: validate
        run: |
          if [ -z "$HOST" ] || [ "$HOST" = "PLACEHOLDER" ]; then
            echo "::notice::Production secrets not configured — deployment skipped. Add PRODUCTION_* secrets to the 'production' environment to enable SSH deployment."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.validate.outputs.ready == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Build backend
        if: steps.validate.outputs.ready == 'true'
        working-directory: backend
        run: |
          npm ci --no-audit --no-fund
          npm run typecheck
          npm test
          npm run build

      - name: Resolve revision
        if: steps.validate.outputs.ready == 'true'
        id: revision
        run: echo "short=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure SSH
        if: steps.validate.outputs.ready == 'true'
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_ed25519 ~/.ssh/known_hosts

      - name: Upload application
        if: steps.validate.outputs.ready == 'true'
        run: |
          rsync -az --delete backend/dist backend/package.json backend/package-lock.json "$USER@$HOST:/opt/homeservermanager/backend/"
          rsync -az deploy/ "$USER@$HOST:/opt/homeservermanager/deploy/"

      - name: Activate release
        if: steps.validate.outputs.ready == 'true'
        env:
          REVISION: ${{ steps.revision.outputs.short }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh "$USER@$HOST" "docker login ghcr.io --username '$GHCR_USERNAME' --password-stdin"
          ssh "$USER@$HOST" "cd /opt/homeservermanager/backend && npm ci --omit=dev --no-audit --no-fund"
          ssh "$USER@$HOST" "cd /opt/homeservermanager/deploy && FRONTEND_IMAGE=ghcr.io/${{ github.repository_owner }}/homeservermanager-frontend:sha-$REVISION docker compose -f compose.production.yaml pull frontend && FRONTEND_IMAGE=ghcr.io/${{ github.repository_owner }}/homeservermanager-frontend:sha-$REVISION docker compose -f compose.production.yaml up -d"
          ssh "$USER@$HOST" "sudo systemctl restart homeservermanager && sudo systemctl is-active --quiet homeservermanager"

      - name: Smoke test deployment
        if: steps.validate.outputs.ready == 'true'
        env:
          REVISION: ${{ steps.revision.outputs.short }}
        run: |
          ssh "$USER@$HOST" "curl -fsS http://127.0.0.1:3000/health >/dev/null"
          ssh "$USER@$HOST" "curl -fsS http://127.0.0.1:3000/ready >/dev/null"
          ssh "$USER@$HOST" "cd /opt/homeservermanager/deploy && FRONTEND_IMAGE=ghcr.io/${{ github.repository_owner }}/homeservermanager-frontend:sha-$REVISION docker compose -f compose.production.yaml exec -T frontend wget -qO- http://localhost:8080/healthz >/dev/null"
