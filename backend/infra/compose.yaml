services:
  api:
    build:
      context: ..
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      READ_AUTH_REQUIRED: ${READ_AUTH_REQUIRED:-false}
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
