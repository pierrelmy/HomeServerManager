services:
  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/pierrelmy/homeservermanager-frontend:latest}
    build:
      context: ../frontend
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN must be set}
    extra_hosts:
      - host.docker.internal:host-gateway
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  prometheus:
    image: prom/prometheus:v3
    profiles: [monitoring]
    restart: unless-stopped
    extra_hosts:
      - host.docker.internal:host-gateway
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - ./secrets/metrics_token:/run/secrets/metrics_token:ro
      - prometheus-data:/prometheus
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

volumes:
  caddy-data:
  caddy-config:
  prometheus-data:
